<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pathogen - Deck-Building Roguelike</title>
    <meta
      name="description"
      content="Pathogen is a deck-building roguelike where you extract Essence from pathogens and survive the Specter within seven turns."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="language-bar" aria-label="Language selector">
      <nav class="language-list" id="languageList"></nav>
    </header>

    <main>
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-media" aria-hidden="true">
          <img src="assets/screenshots/screenshot0002.png" alt="">
        </div>
        <div class="hero-shade"></div>
        <div class="hero-content">
          <p class="eyebrow" data-i18n="hero.kicker"></p>
          <h1 id="hero-title" data-i18n="hero.title"></h1>
          <p class="hero-copy" data-i18n="hero.copy"></p>
          <div class="hero-actions">
            <a class="button steam" href="https://store.steampowered.com/app/4718090/Pathogen/" target="_blank" rel="noreferrer" data-i18n="hero.steam"></a>
            <a class="button primary" href="#trailer" data-i18n="hero.trailer"></a>
            <a class="button secondary" href="#features" data-i18n="hero.features"></a>
          </div>
          <dl class="hero-facts">
            <div>
              <dt data-i18n="facts.genre.label"></dt>
              <dd data-i18n="facts.genre.value"></dd>
            </div>
            <div>
              <dt data-i18n="facts.platform.label"></dt>
              <dd data-i18n="facts.platform.value"></dd>
            </div>
            <div>
              <dt data-i18n="facts.os.label"></dt>
              <dd data-i18n="facts.os.value"></dd>
            </div>
            <div>
              <dt data-i18n="facts.release.label"></dt>
              <dd data-i18n="facts.release.value"></dd>
            </div>
            <div>
              <dt data-i18n="facts.developer.label"></dt>
              <dd data-i18n="facts.developer.value"></dd>
            </div>
          </dl>
        </div>
      </section>

      <section class="intro section-band">
        <div class="section-inner intro-grid">
          <div>
            <p class="eyebrow" data-i18n="overview.kicker"></p>
            <h2 data-i18n="overview.title"></h2>
          </div>
          <div class="intro-copy">
            <p data-i18n="overview.body1"></p>
            <p data-i18n="overview.body2"></p>
          </div>
        </div>
      </section>

      <section id="trailer" class="section-inner trailer-layout" aria-labelledby="trailer-title">
        <div>
          <p class="eyebrow" data-i18n="trailerSection.kicker"></p>
          <h2 id="trailer-title" data-i18n="trailerSection.title"></h2>
          <p data-i18n="trailerSection.body"></p>
        </div>
        <div class="video-frame">
          <iframe
            data-youtube-id="1TwyJMQPKNs"
            title="Pathogen trailer"
            referrerpolicy="strict-origin-when-cross-origin"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
          ></iframe>
        </div>
      </section>

      <section class="section-inner story-layout" aria-labelledby="story-title">
        <div class="story-image">
          <img src="assets/screenshots/screenshot0004.png" alt="Pathogen story event choice screen">
        </div>
        <div>
          <p class="eyebrow" data-i18n="story.kicker"></p>
          <h2 id="story-title" data-i18n="story.title"></h2>
          <p data-i18n="story.body1"></p>
          <p data-i18n="story.body2"></p>
          <p class="note" data-i18n="story.note"></p>
        </div>
      </section>

      <section id="features" class="section-band feature-band" aria-labelledby="features-title">
        <div class="section-inner">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="features.kicker"></p>
            <h2 id="features-title" data-i18n-rich="features.title"></h2>
            <p data-i18n="features.subtitle"></p>
          </div>
          <div class="feature-grid" id="featureGrid"></div>
        </div>
      </section>

      <section class="section-inner difference-layout" aria-labelledby="difference-title">
        <div>
          <p class="eyebrow" data-i18n="difference.kicker"></p>
          <h2 id="difference-title" data-i18n="difference.title"></h2>
          <p data-i18n="difference.subtitle"></p>
        </div>
        <div class="difference-list" id="differenceList"></div>
      </section>

      <section class="gallery section-band" aria-labelledby="gallery-title">
        <div class="section-inner">
          <div class="section-heading compact">
            <p class="eyebrow" data-i18n="gallery.kicker"></p>
            <h2 id="gallery-title" data-i18n="gallery.title"></h2>
            <p data-i18n="gallery.hint"></p>
          </div>
          <div class="gallery-grid">
            <figure>
              <button class="gallery-button" type="button" data-gallery-image="assets/screenshots/screenshot0001.png">
                <img src="assets/screenshots/screenshot0001.png" alt="Early Pathogen battle board">
              </button>
              <figcaption data-i18n="gallery.items.0"></figcaption>
            </figure>
            <figure>
              <button class="gallery-button" type="button" data-gallery-image="assets/screenshots/screenshot0003.png">
                <img src="assets/screenshots/screenshot0003.png" alt="Boss encounter in Pathogen">
              </button>
              <figcaption data-i18n="gallery.items.1"></figcaption>
            </figure>
            <figure>
              <button class="gallery-button" type="button" data-gallery-image="assets/screenshots/screenshot0005.png">
                <img src="assets/screenshots/screenshot0005.png" alt="DNA modification reward cards">
              </button>
              <figcaption data-i18n="gallery.items.2"></figcaption>
            </figure>
          </div>
        </div>
      </section>

      <section class="section-inner cta" aria-labelledby="cta-title">
        <p id="cta-title" data-i18n="cta.body"></p>
      </section>

      <section class="press section-band" aria-labelledby="press-title">
        <div class="section-inner press-layout">
          <div>
            <p class="eyebrow" data-i18n="press.kicker"></p>
            <h2 id="press-title" data-i18n="press.title"></h2>
            <p data-i18n="press.intro"></p>
          </div>
          <div class="press-copy">
            <button class="icon-button" id="copyPress" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M8 8h11v11H8z"></path>
                <path d="M5 16H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v1"></path>
              </svg>
              <span data-copy-label data-i18n="press.button"></span>
            </button>
            <textarea id="pressText" readonly></textarea>
          </div>
        </div>
      </section>
    </main>

    <div class="image-modal" id="imageModal" aria-hidden="true">
      <div class="image-modal-panel" role="dialog" aria-modal="true">
        <button class="modal-close" id="modalClose" type="button">×</button>
        <img id="modalImage" alt="">
        <p id="modalCaption"></p>
      </div>
    </div>

    <footer class="footer">
      <span data-i18n="footer"></span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
